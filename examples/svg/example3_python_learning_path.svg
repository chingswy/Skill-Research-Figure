  </text>

  <!-- Branching paths -->
  <!-- Branch A: Web Dev -->
  <rect x="135" y="870" width="220" height="110" rx="10" fill="#ecfdf5" stroke="#10b981" stroke-width="2.5" filter="url(#sketchy)"/>
  <text x="245" y="900" text-anchor="middle" font-size="15" fill="#065f46" font-weight="bold">Web 开发</text>
  <text x="245" y="923" text-anchor="middle" font-size="12" fill="#059669" class="label-en">Flask / Django</text>
  <text x="245" y="947" text-anchor="middle" font-size="12" fill="#475569">REST API</text>
  <text x="245" y="967" text-anchor="middle" font-size="11" fill="#64748b" class="label-en">HTML + Database</text>

  <!-- Branch B: Data Science -->
  <rect x="385" y="870" width="230" height="110" rx="10" fill="#ecfdf5" stroke="#10b981" stroke-width="2.5" filter="url(#sketchy)"/>
  <text x="500" y="900" text-anchor="middle" font-size="15" fill="#065f46" font-weight="bold">数据科学</text>
  <text x="500" y="923" text-anchor="middle" font-size="12" fill="#059669" class="label-en">NumPy / Pandas</text>
  <text x="500" y="947" text-anchor="middle" font-size="12" fill="#475569">数据清洗 / 可视化</text>
  <text x="500" y="967" text-anchor="middle" font-size="11" fill="#64748b" class="label-en">Matplotlib + Seaborn</text>

  <!-- Branch C: Automation -->
  <rect x="645" y="870" width="270" height="110" rx="10" fill="#ecfdf5" stroke="#10b981" stroke-width="2.5" filter="url(#sketchy)"/>
  <text x="780" y="900" text-anchor="middle" font-size="15" fill="#065f46" font-weight="bold">自动化 / 脚本</text>
  <text x="780" y="923" text-anchor="middle" font-size="12" fill="#059669" class="label-en">Automation Scripts</text>
  <text x="780" y="947" text-anchor="middle" font-size="12" fill="#475569">爬虫 / 办公自动化</text>
  <text x="780" y="967" text-anchor="middle" font-size="11" fill="#64748b" class="label-en">requests + openpyxl</text>

  <!-- Branch arrows from top -->
  <path d="M 350 848 L 245 868" fill="none" stroke="#2d8a4e" stroke-width="2.5" marker-end="url(#arrow-green)"/>
  <line x1="500" y1="848" x2="500" y2="868" stroke="#2d8a4e" stroke-width="2.5" marker-end="url(#arrow-green)"/>
  <path d="M 650 848 L 755 868" fill="none" stroke="#2d8a4e" stroke-width="2.5" marker-end="url(#arrow-green)"/>

  <!-- "Choose your path" label -->
  <text x="500" y="862" text-anchor="middle" font-size="12" fill="#2d8a4e">← 选择方向 →</text>

  <!-- Milestone -->
