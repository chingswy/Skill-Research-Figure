  <rect x="135" y="530" width="200" height="100" rx="10" fill="#fefce8" stroke="#eab308" stroke-width="2" filter="url(#sketchy)"/>
  <text x="235" y="560" text-anchor="middle" font-size="16" fill="#78350f" font-weight="bold">函数</text>
  <text x="235" y="583" text-anchor="middle" font-size="12" fill="#a16207" class="label-en">Functions</text>
  <text x="235" y="606" text-anchor="middle" font-size="12" fill="#475569">定义 / 参数 / 返回</text>
  <text x="235" y="625" text-anchor="middle" font-size="11" fill="#64748b" class="label-en">*args, **kwargs</text>

  <rect x="360" y="530" width="200" height="100" rx="10" fill="#fefce8" stroke="#eab308" stroke-width="2" filter="url(#sketchy)"/>
  <text x="460" y="560" text-anchor="middle" font-size="16" fill="#78350f" font-weight="bold">面向对象</text>
  <text x="460" y="583" text-anchor="middle" font-size="12" fill="#a16207" class="label-en">OOP</text>
  <text x="460" y="606" text-anchor="middle" font-size="12" fill="#475569">类 / 继承 / 多态</text>
  <text x="460" y="625" text-anchor="middle" font-size="11" fill="#64748b" class="label-en">class, self, super</text>

  <rect x="585" y="530" width="200" height="100" rx="10" fill="#fefce8" stroke="#eab308" stroke-width="2" filter="url(#sketchy)"/>
  <text x="685" y="560" text-anchor="middle" font-size="16" fill="#78350f" font-weight="bold">文件与异常</text>
  <text x="685" y="583" text-anchor="middle" font-size="12" fill="#a16207" class="label-en">File I/O + Errors</text>
  <text x="685" y="606" text-anchor="middle" font-size="12" fill="#475569">读写 / try-except</text>
  <text x="685" y="625" text-anchor="middle" font-size="11" fill="#64748b" class="label-en">with open(...)</text>

  <!-- Arrows between sub-boxes -->
  <line x1="337" y1="580" x2="358" y2="580" stroke="#d4920a" stroke-width="3" marker-end="url(#arrow-orange)"/>
  <line x1="562" y1="580" x2="583" y2="580" stroke="#d4920a" stroke-width="3" marker-end="url(#arrow-orange)"/>

  <!-- Side branch: modules -->
  <rect x="800" y="545" width="130" height="70" rx="8" fill="#fff7ed" stroke="#f97316" stroke-width="1.5" filter="url(#sketchy)"/>
  <text x="865" y="575" text-anchor="middle" font-size="13" fill="#9a3412" font-weight="bold">模块化</text>
  <text x="865" y="595" text-anchor="middle" font-size="11" fill="#c2410c" class="label-en">import / pip</text>
  <line x1="787" y1="580" x2="798" y2="580" stroke="#f97316" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arrow-orange)"/>

  <!-- Milestone -->
  <rect x="270" y="655" width="460" height="42" rx="20" fill="#fef3c7" stroke="#d4920a" stroke-width="2.5" filter="url(#sketchy)"/>
  <text x="500" y="682" text-anchor="middle" font-size="14" fill="#92400e">
    🎯 里程碑：用 OOP 写一个图书管理系统
  </text>

  <!-- ==================== ARROW: Level 2 → Level 3 ==================== -->
  <line x1="500" y1="742" x2="500" y2="775" stroke="#2d8a4e" stroke-width="3.5" marker-end="url(#arrow-green)"/>

