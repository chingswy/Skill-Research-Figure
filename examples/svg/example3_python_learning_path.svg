  <!-- Background -->
  <rect width="1000" height="1414" fill="#fefefe"/>

  <!-- ==================== TITLE ==================== -->
  <text x="500" y="50" text-anchor="middle" font-size="32" fill="#1e293b" font-weight="bold">
    Python 学习路径
  </text>
  <text x="500" y="80" text-anchor="middle" font-size="15" fill="#64748b" class="label-en">
    Python Learning Roadmap — From Zero to Hero
  </text>

  <!-- ==================== LEVEL INDICATOR (left side) ==================== -->
  <line x1="60" y1="120" x2="60" y2="1350" stroke="#e2e8f0" stroke-width="3"/>
  <text x="55" y="180" text-anchor="end" font-size="13" fill="#94a3b8" transform="rotate(-90, 55, 180)">入门</text>
  <text x="55" y="520" text-anchor="end" font-size="13" fill="#94a3b8" transform="rotate(-90, 55, 520)">基础</text>
  <text x="55" y="860" text-anchor="end" font-size="13" fill="#94a3b8" transform="rotate(-90, 55, 860)">进阶</text>
  <text x="55" y="1200" text-anchor="end" font-size="13" fill="#94a3b8" transform="rotate(-90, 55, 1200)">精通</text>

  <!-- Level dots -->
  <circle cx="60" cy="155" r="8" fill="#3b82d0"/>
  <circle cx="60" cy="450" r="8" fill="#d4920a"/>
  <circle cx="60" cy="780" r="8" fill="#2d8a4e"/>
  <circle cx="60" cy="1100" r="8" fill="#7c3aed"/>

  <!-- ==================== LEVEL 1: GETTING STARTED ==================== -->
  <rect x="100" y="120" width="850" height="290" rx="20" fill="url(#hatch-blue)" stroke="#3b82d0" stroke-width="3" filter="url(#sketchy)"/>
  <rect x="100" y="120" width="850" height="290" rx="20" fill="#dbeafe" opacity="0.2"/>
  <text x="500" y="158" text-anchor="middle" font-size="24" fill="#1e40af" font-weight="bold">
    第一阶段：入门起步
  </text>
  <text x="500" y="183" text-anchor="middle" font-size="13" fill="#3b82d0" class="label-en">
    Week 1-2 · Getting Started
  </text>

  <!-- Sub-boxes -->
  <rect x="135" y="200" width="230" height="100" rx="10" fill="#eff6ff" stroke="#60a5fa" stroke-width="2" filter="url(#sketchy)"/>
  <text x="250" y="230" text-anchor="middle" font-size="16" fill="#1d4ed8" font-weight="bold">环境搭建</text>
  <text x="250" y="255" text-anchor="middle" font-size="12" fill="#3b82d0" class="label-en">Install Python</text>
  <text x="250" y="278" text-anchor="middle" font-size="12" fill="#475569">安装 / IDE / 终端</text>
  <text x="250" y="295" text-anchor="middle" font-size="11" fill="#64748b" class="label-en">VSCode + pip</text>

  <rect x="390" y="200" width="230" height="100" rx="10" fill="#eff6ff" stroke="#60a5fa" stroke-width="2" filter="url(#sketchy)"/>
  <text x="505" y="230" text-anchor="middle" font-size="16" fill="#1d4ed8" font-weight="bold">基本语法</text>
  <text x="505" y="255" text-anchor="middle" font-size="12" fill="#3b82d0" class="label-en">Syntax Basics</text>
  <text x="505" y="278" text-anchor="middle" font-size="12" fill="#475569">变量 / 类型 / 运算符</text>
  <text x="505" y="295" text-anchor="middle" font-size="11" fill="#64748b" class="label-en">int, str, list, dict</text>

  <rect x="645" y="200" width="270" height="100" rx="10" fill="#eff6ff" stroke="#60a5fa" stroke-width="2" filter="url(#sketchy)"/>
  <text x="780" y="230" text-anchor="middle" font-size="16" fill="#1d4ed8" font-weight="bold">控制流程</text>
  <text x="780" y="255" text-anchor="middle" font-size="12" fill="#3b82d0" class="label-en">Control Flow</text>
  <text x="780" y="278" text-anchor="middle" font-size="12" fill="#475569">if / for / while</text>
  <text x="780" y="295" text-anchor="middle" font-size="11" fill="#64748b" class="label-en">loops + conditionals</text>

  <!-- Arrows between sub-boxes -->
  <line x1="367" y1="250" x2="388" y2="250" stroke="#3b82d0" stroke-width="3" marker-end="url(#arrow-blue)"/>
  <line x1="622" y1="250" x2="643" y2="250" stroke="#3b82d0" stroke-width="3" marker-end="url(#arrow-blue)"/>

  <!-- Milestone -->
  <rect x="300" y="320" width="400" height="42" rx="20" fill="#dbeafe" stroke="#3b82d0" stroke-width="2.5" filter="url(#sketchy)"/>
  <text x="500" y="347" text-anchor="middle" font-size="14" fill="#1e40af">
    🎯 里程碑：写出第一个猜数字小游戏
  </text>

  <!-- ==================== ARROW: Level 1 → Level 2 ==================== -->
  <line x1="500" y1="412" x2="500" y2="440" stroke="#d4920a" stroke-width="3.5" marker-end="url(#arrow-orange)"/>

  <!-- ==================== LEVEL 2: FUNDAMENTALS ==================== -->
  <rect x="100" y="450" width="850" height="290" rx="20" fill="url(#hatch-orange)" stroke="#d4920a" stroke-width="3" filter="url(#sketchy)"/>
  <rect x="100" y="450" width="850" height="290" rx="20" fill="#fef3c7" opacity="0.2"/>
  <text x="500" y="488" text-anchor="middle" font-size="24" fill="#92400e" font-weight="bold">
    第二阶段：夯实基础
  </text>
  <text x="500" y="513" text-anchor="middle" font-size="13" fill="#d4920a" class="label-en">
