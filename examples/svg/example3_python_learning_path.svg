  <text x="500" y="1027" text-anchor="middle" font-size="14" fill="#065f46">
    🎯 里程碑：完成一个独立项目并部署到 GitHub
  </text>

  <!-- ==================== ARROW: Level 3 → Level 4 ==================== -->
  <line x1="500" y1="1077" x2="500" y2="1108" stroke="#7c3aed" stroke-width="3.5" marker-end="url(#arrow-purple)"/>

  <!-- ==================== LEVEL 4: ADVANCED ==================== -->
  <rect x="100" y="1118" width="850" height="260" rx="20" fill="url(#hatch-purple)" stroke="#7c3aed" stroke-width="3" filter="url(#sketchy)"/>
  <rect x="100" y="1118" width="850" height="260" rx="20" fill="#ede9fe" opacity="0.2"/>
  <text x="500" y="1156" text-anchor="middle" font-size="24" fill="#5b21b6" font-weight="bold">
