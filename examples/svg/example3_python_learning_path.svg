  <rect x="100" y="785" width="850" height="290" rx="20" fill="url(#hatch-green)" stroke="#2d8a4e" stroke-width="3" filter="url(#sketchy)"/>
  <rect x="100" y="785" width="850" height="290" rx="20" fill="#d1fae5" opacity="0.2"/>
  <text x="500" y="823" text-anchor="middle" font-size="24" fill="#065f46" font-weight="bold">
    第三阶段：专项进阶
  </text>
  <text x="500" y="848" text-anchor="middle" font-size="13" fill="#2d8a4e" class="label-en">
