  </text>

  <!-- Sub-boxes -->
  <rect x="135" y="1200" width="220" height="80" rx="10" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="2" filter="url(#sketchy)"/>
  <text x="245" y="1230" text-anchor="middle" font-size="14" fill="#5b21b6" font-weight="bold">设计模式</text>
