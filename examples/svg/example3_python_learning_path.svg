  <text x="245" y="1275" text-anchor="middle" font-size="11" fill="#6d28d9">SOLID / 工厂 / 观察者</text>

  <rect x="385" y="1200" width="230" height="80" rx="10" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="2" filter="url(#sketchy)"/>
  <text x="500" y="1230" text-anchor="middle" font-size="14" fill="#5b21b6" font-weight="bold">并发与性能</text>
  <text x="500" y="1255" text-anchor="middle" font-size="12" fill="#7c3aed" class="label-en">Concurrency + Perf</text>
  <text x="500" y="1275" text-anchor="middle" font-size="11" fill="#6d28d9">asyncio / 多进程</text>

  <rect x="645" y="1200" width="270" height="80" rx="10" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="2" filter="url(#sketchy)"/>
  <text x="780" y="1230" text-anchor="middle" font-size="14" fill="#5b21b6" font-weight="bold">开源贡献</text>
  <text x="780" y="1255" text-anchor="middle" font-size="12" fill="#7c3aed" class="label-en">Open Source</text>
  <text x="780" y="1275" text-anchor="middle" font-size="11" fill="#6d28d9">PR / Code Review / CI</text>

  <!-- Final milestone -->
  <rect x="250" y="1305" width="500" height="45" rx="22" fill="#ede9fe" stroke="#7c3aed" stroke-width="3" filter="url(#sketchy)"/>
  <text x="500" y="1333" text-anchor="middle" font-size="15" fill="#5b21b6" font-weight="bold">
    🏆 终极目标：成为独立开发者 / 技术专家
  </text>

  <!-- ==================== RIGHT SIDE: TIPS ==================== -->
  <!-- Tip bubble 1 -->
  <rect x="810" y="150" width="140" height="55" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5" filter="url(#sketchy)"/>
  <text x="880" y="173" text-anchor="middle" font-size="11" fill="#92400e">💡 每天 30 分钟</text>
  <text x="880" y="193" text-anchor="middle" font-size="11" fill="#92400e">比周末突击好</text>

  <!-- Tip bubble 2 -->
  <rect x="810" y="480" width="140" height="55" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5" filter="url(#sketchy)"/>
  <text x="880" y="503" text-anchor="middle" font-size="11" fill="#92400e">💡 多写项目</text>
  <text x="880" y="523" text-anchor="middle" font-size="11" fill="#92400e">少看不练</text>

  <!-- Tip bubble 3 -->
  <rect x="810" y="810" width="140" height="55" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5" filter="url(#sketchy)"/>
  <text x="880" y="833" text-anchor="middle" font-size="11" fill="#92400e">💡 选一个方向</text>
